name: 🔥 BOOSTER-1 (Menit 0-12)

on:
  schedule:
    - cron: '*/1 * * * *'  # Tiap menit
  workflow_dispatch:

jobs:
  boost:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 BOOST NONSTOP
        run: |
          for i in {1..60}; do
            curl -s -o /dev/null -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
              "https://github.com/ikyapakeofc/NGLSPAMMER" &
            curl -s -o /dev/null -A "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) Safari/605.1.15" \
              "https://raw.githubusercontent.com/ikyapakeofc/NGLSPAMMER/main/README.md" &
            curl -s -o /dev/null "https://komarev.com/ghpvc/?username=ikyapakeofc&repo=NGLSPAMMER" &
            sleep 1
            echo "✅ View $i boosted!"
          done          # Visit tiap URL dengan user agent random
          for url in "${URLS[@]}"; do
            for i in {1..5}; do
              UA=${USER_AGENTS[$RANDOM % ${#USER_AGENTS[@]}]}
              
              echo "👁️ Visiting: $url"
              curl -s -o /dev/null -w "Status: %{http_code}\n" \
                -A "$UA" \
                -H "Accept: text/html,application/xhtml+xml" \
                -H "Accept-Language: en-US,en;q=0.9" \
                "$url"
              
              # Delay random biar natural
              sleep $((RANDOM % 3 + 1))
            done
          done
          
          echo "✅ Boost selesai! Views naik! 📈"
